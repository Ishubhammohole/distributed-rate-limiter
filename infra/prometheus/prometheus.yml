global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'rate-limiter-monitor'

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Rate Limiter Service
  - job_name: 'rate-limiter'
    static_configs:
      - targets: ['rate-limiter:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    scrape_timeout: 3s
    honor_labels: true

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

# Alerting configuration (for future use)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093