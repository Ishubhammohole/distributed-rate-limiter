server:
  port: 8080
  tomcat:
    threads:
      # The service is synchronous (Spring MVC + Redis), so allowing a few hundred
      # worker threads prevents request queuing from dominating latency under load.
      max: 400
      min-spare: 20
    max-connections: 8192
    accept-count: 1000

spring:
  application:
    name: distributed-rate-limiter
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          # The service is synchronous and each request borrows a Redis connection
          # for a single Lua script. A wider pool prevents borrow starvation once
          # Tomcat concurrency climbs during the k6 benchmark.
          max-active: 400
          max-idle: 100
          min-idle: 20
          max-wait: 500ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.ratelimiter: INFO
    org.springframework.data.redis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Rate Limiter Configuration
rate-limiter:
  fail-open: true
  default-algorithm: token_bucket
  redis:
    script-cache-size: 100
    connection-timeout: 2000ms
    command-timeout: 2000ms
