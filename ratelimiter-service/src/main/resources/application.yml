server:
  port: 8080

spring:
  application:
    name: distributed-rate-limiter
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 20
          min-idle: 10
          max-wait: 100ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.ratelimiter: INFO
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Rate Limiter Configuration
rate-limiter:
  fail-open: true
  default-algorithm: token_bucket
  redis:
    script-cache-size: 100
    connection-timeout: 2000ms
    command-timeout: 1000ms
  profiling:
    enabled: false
    log-per-request: false
