spring:
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 20
          min-idle: 10
          max-wait: 100ms

logging:
  level:
    com.ratelimiter: INFO
    org.springframework.data.redis: WARN

rate-limiter:
  profiling:
    enabled: true
    log-per-request: false
