server:
  tomcat:
    threads:
      max: 400
      min-spare: 20
    max-connections: 8192
    accept-count: 1000

spring:
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 400
          max-idle: 100
          min-idle: 20
          max-wait: 500ms

logging:
  level:
    com.ratelimiter: INFO
    org.springframework.data.redis: WARN
